name: Build-1.20.1

on:
  push:
    paths:
      - 'mod.zip'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip mod.zip
        run: |
          mkdir -p mod_extracted
          unzip mod.zip -d mod_extracted

      - name: Flatten mod/ subfolder if present
        run: |
          if [ -d "mod_extracted/mod" ]; then
            echo "Found mod/ subfolder – moving its contents up"
            shopt -s dotglob
            mv mod_extracted/mod/* mod_extracted/
            rmdir mod_extracted/mod
          else
            echo "No mod/ subfolder found – keeping files as-is"
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.8
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      - name: Build mod with Gradle
        working-directory: mod_extracted
        run: gradle build

      - name: Upload built mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-build
          path: mod_extracted/build/libs/*.jar
