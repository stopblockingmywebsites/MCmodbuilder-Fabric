name: Build-1.20.1

on:
  push:
    paths:
      - '*.zip'
      - 'input/*.zip'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find zip and extract
        run: |
          set -euo pipefail
          shopt -s nullglob
          zips=( input/*.zip *.zip )
          if [[ ${#zips[@]} -eq 0 ]]; then
            echo "ERROR: No .zip file found in input/ or repo root." >&2
            exit 1
          fi
          ZIP="${zips[0]}"
          echo "Using zip: $ZIP"
          mkdir -p work
          unzip "$ZIP" -d work

      - name: Detect Gradle project root
        run: |
          set -euo pipefail
          PROJECT_ROOT=""
          for gradle_file in settings.gradle settings.gradle.kts build.gradle build.gradle.kts; do
            found=$(find work -maxdepth 4 -name "$gradle_file" | sort | head -1)
            if [[ -n "$found" ]]; then
              PROJECT_ROOT=$(dirname "$found")
              echo "Detected project root via $gradle_file: $PROJECT_ROOT"
              break
            fi
          done
          if [[ -z "$PROJECT_ROOT" ]]; then
            echo "ERROR: No Gradle project root found after extraction." >&2
            exit 1
          fi
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> "$GITHUB_ENV"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.8
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      - name: Build mod with Gradle
        run: |
          set -euo pipefail
          cd "$PROJECT_ROOT"
          if [[ -f "gradle/wrapper/gradle-wrapper.jar" && -f "gradlew" ]]; then
            echo "Gradle wrapper found — using ./gradlew"
            chmod +x gradlew
            ./gradlew build --no-daemon
          else
            echo "No Gradle wrapper found — using system gradle"
            if ! command -v gradle &>/dev/null; then
              echo "ERROR: gradle command not available." >&2
              exit 1
            fi
            gradle --version
            gradle build --no-daemon
          fi

      - name: Upload built mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-build
          path: ${{ env.PROJECT_ROOT }}/build/libs/*.jar
